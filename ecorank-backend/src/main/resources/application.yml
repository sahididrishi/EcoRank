spring:
  application:
    name: ecorank-backend
  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  shutdown: graceful

ecorank:
  jwt:
    secret: ${JWT_SIGNING_KEY:default-dev-secret-that-is-at-least-32-characters-long}
    access-token-expiry-minutes: 15
    refresh-token-expiry-days: 7
  plugin:
    api-key: ${PLUGIN_API_KEY:dev-plugin-api-key}
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:sk_test_placeholder}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_test_placeholder}
  paypal:
    client-id: ${PAYPAL_CLIENT_ID:paypal-client-id-placeholder}
    client-secret: ${PAYPAL_CLIENT_SECRET:paypal-client-secret-placeholder}
    mode: sandbox

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
