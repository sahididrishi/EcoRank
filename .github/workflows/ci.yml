name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Run backend tests
        working-directory: ecorank-backend
        run: mvn test -B
        env:
          SPRING_PROFILES_ACTIVE: dev
          JWT_SIGNING_KEY: ci-test-secret-key-minimum-32-chars
          PLUGIN_API_KEY: ci-test-api-key
          STRIPE_SECRET_KEY: sk_test_fake
          STRIPE_WEBHOOK_SECRET: whsec_test_fake

  plugin-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Run plugin tests
        working-directory: ecorank-plugin
        run: mvn test -B

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: ecorank-frontend/package-lock.json
      - name: Install dependencies
        working-directory: ecorank-frontend
        run: npm ci
      - name: Lint
        working-directory: ecorank-frontend
        run: npm run lint
      - name: Build
        working-directory: ecorank-frontend
        run: npm run build

  docker-build:
    needs: [backend-test, plugin-test, frontend-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker compose build
